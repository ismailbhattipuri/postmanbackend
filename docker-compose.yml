version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: own_postman_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ownpostman
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: own_postman_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
